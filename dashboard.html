<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<div class="dashboard">

 
  <div class="sidebar">
    <h2>Sistema Escolar</h2>
    <ul>
      <li>Inicio</li>
      <li>Estudiantes</li>
      <li>Profesores</li>
      <li>Notas</li>
      <li>Configuración</li>
      <li><a href="login.html">Cerrar sesión</a></li>
    </ul>
  </div>

  
  <div class="main-content">
    <header>
      <h1>Bienvenido, Administrador</h1>
    </header>

    <div class="cards">
      <div class="card">
        <h3>150</h3>
        <p>Estudiantes</p>
      </div>

      <div class="card">
        <h3>12</h3>
        <p>Profesores</p>
      </div>

      <div class="card">
        <h3>8</h3>
        <p>Materias</p>
      </div>

      <div class="card">
        <h3>3</h3>
        <p>Grados</p>
      </div>
    </div>
  </div>

</div>

</html>
